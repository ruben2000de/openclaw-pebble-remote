name: Bug report
description: Something did not work as expected
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please redact hook URLs, bearer tokens, private channel ids and captured personal text.
  - type: input
    id: watch
    attributes:
      label: Watch model / platform
      placeholder: Pebble Time, Pebble 2, Core device, basalt/chalk/flint/...
  - type: input
    id: phone
    attributes:
      label: Phone app / OS
      placeholder: Android Core app version, iOS/RePebble app, OS version
  - type: dropdown
    id: build
    attributes:
      label: Build/install path
      options:
        - CloudPebble
        - Local pebble build
        - PBW from release
        - Other
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Which button/action did you use?
      placeholder: |
        1. Open app
        2. Press Up
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/screenshots
      description: Redact secrets and private data.
