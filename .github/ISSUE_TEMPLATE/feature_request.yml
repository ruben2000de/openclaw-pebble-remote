name: Feature request
description: Suggest a small, safe improvement
title: "Feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This does not require shell commands from the watch.
        - label: This does not send messages to third parties without a human confirmation path.
        - label: This does not require committing secrets or private endpoints.
